<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Málaga 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f4f1de; color: #2f3147;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .gate { text-align: center; max-width: 380px; width: 100%; }
  .gate h1 {
    font-family: 'Italiana', Georgia, serif; font-weight: 400;
    font-size: 3.2rem; letter-spacing: .08em; color: #2a2c44; line-height: 1;
  }
  .gate .eyebrow {
    text-transform: uppercase; letter-spacing: .42em; font-size: .65rem; font-weight: 600;
    color: #6e7087; margin-bottom: 1rem;
  }
  .gate .sub { color: #6e7087; font-size: .85rem; margin-top: .9rem; letter-spacing: .03em; }
  form { margin-top: 2.2rem; }
  input[type="password"] {
    width: 100%; font: inherit; font-size: 1rem; text-align: center; letter-spacing: .15em;
    padding: .8rem 1rem; border: 1px solid rgba(47, 49, 71, .25); border-radius: 4px;
    background: #fff; color: #2f3147;
  }
  input[type="password"]:focus { outline: none; border-color: #3d405b; }
  button {
    width: 100%; margin-top: .8rem; font: inherit; font-weight: 600; font-size: .68rem;
    text-transform: uppercase; letter-spacing: .16em; cursor: pointer;
    border: none; border-radius: 4px; padding: .85rem;
    background: #3d405b; color: #fff; transition: background .15s;
  }
  button:hover { background: #2a2c44; }
  button:disabled { opacity: .6; cursor: wait; }
  .remember {
    display: flex; align-items: center; justify-content: center; gap: .45rem;
    margin-top: 1.1rem; font-size: .78rem; color: #6e7087;
  }
  .remember input { accent-color: #3d405b; }
  #err { color: #c75f45; font-size: .8rem; margin-top: .9rem; min-height: 1.2em; }
</style>
</head>
<body>
<div class="gate">
  <p class="eyebrow">Family Trip · Sept 14 – 19, 2026</p>
  <h1>Málaga</h1>
  <p class="sub">This page is private. Enter the family password to open it.</p>
  <form id="form">
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" autofocus>
    <button id="go" type="submit">Open</button>
    <label class="remember"><input type="checkbox" id="remember" checked> Remember on this device</label>
    <p id="err"></p>
  </form>
</div>

  function b64ToBytes(b64) {
    var bin = atob(b64);
    var a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return a;
  }

  function unlock(pw) {
    var data = b64ToBytes(PAYLOAD);
    var salt = data.slice(8, 16);   /* openssl "Salted__" header: bytes 0-7 magic, 8-15 salt */
    var ct = data.slice(16);
    return crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits'])
      .then(function (km) {
        return crypto.subtle.deriveBits({ name: 'PBKDF2', salt: salt, iterations: ITER, hash: 'SHA-256' }, km, 384);
      })
      .then(function (bits) {
        var b = new Uint8Array(bits);
        var iv = b.slice(32, 48);
        return crypto.subtle.importKey('raw', b.slice(0, 32), { name: 'AES-CBC' }, false, ['decrypt'])
          .then(function (key) { return crypto.subtle.decrypt({ name: 'AES-CBC', iv: iv }, key, ct); });
      })
      .then(function (pt) {
        var html = new TextDecoder().decode(pt);
        if (html.indexOf('<!DOCTYPE html>') !== 0) throw new Error('wrong password');
        return html;
      });
  }

  function show(html) {
    document.open();
    document.write(html);
    document.close();
  }

  var form = document.getElementById('form'),
      pwInput = document.getElementById('pw'),
      goBtn = document.getElementById('go'),
      err = document.getElementById('err'),
      remember = document.getElementById('remember');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var pw = pwInput.value;
    if (!pw) return;
    err.textContent = '';
    goBtn.disabled = true;
    goBtn.textContent = 'Opening…';
    unlock(pw).then(function (html) {
      if (remember.checked) {
        try { localStorage.setItem('malagaGateKey', pw); } catch (ex) {}
      }
      show(html);
    }).catch(function () {
      goBtn.disabled = false;
      goBtn.textContent = 'Open';
      err.textContent = 'That password didn’t work — try again.';
      pwInput.select();
    });
  });

  /* auto-unlock if remembered */
  var saved = null;
  try { saved = localStorage.getItem('malagaGateKey'); } catch (ex) {}
  if (saved) {
    goBtn.disabled = true;
    goBtn.textContent = 'Opening…';
    unlock(saved).then(show).catch(function () {
      try { localStorage.removeItem('malagaGateKey'); } catch (ex) {}
      goBtn.disabled = false;
      goBtn.textContent = 'Open';
    });
  }
})();
